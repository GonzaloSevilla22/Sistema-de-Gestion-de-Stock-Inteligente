services:
  - type: web
    name: stockiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockiq-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: AI_PROVIDER
        value: claude
      - key: AI_API_KEY
        sync: false
    healthCheckPath: /health

databases:
  - name: stockiq-db
    plan: free
